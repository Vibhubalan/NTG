name: Daily leaderboard refresh

on:
  # Backup if Vercel cron misses: 21:05 UTC = 2:35 AM IST
  schedule:
    - cron: "5 21 * * *"
  # Primary: Vercel cron → /api/cron/trigger-daily-leaderboard (workflow_dispatch)
  workflow_dispatch:

concurrency:
  group: daily-leaderboard-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Run full leaderboard sync
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${SITE_URL:-}" ] || [ -z "${CRON_SECRET:-}" ]; then
            echo "Missing SITE_URL or CRON_SECRET repository secrets."
            exit 1
          fi

          # Strip whitespace, CR/LF, and accidental wrapping quotes from secret values.
          SITE_URL="$(printf '%s' "$SITE_URL" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//")"
          CRON_SECRET="$(printf '%s' "$CRON_SECRET" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' -e 's/^"//' -e 's/"$//' -e "s/^'//" -e "s/'$//")"

          if ! printf '%s' "$SITE_URL" | grep -qE '^https?://[^[:space:]]+$'; then
            echo "SITE_URL secret is malformed."
            echo "Set it to: https://www.ntgesports.com"
            echo "No quotes, no trailing slash, no spaces or newlines."
            exit 1
          fi

          BASE="${SITE_URL%/}/api/cron/sync-ranks"
          AUTH_HEADER="$(printf 'Authorization: Bearer %s' "$CRON_SECRET")"
          echo "Calling ${BASE} (SITE_URL length: ${#SITE_URL}, CRON_SECRET length: ${#CRON_SECRET})"
          ATTEMPTS=0
          MAX_ATTEMPTS=50
          MODE="start"
          COMPLETE="false"

          while [ "$ATTEMPTS" -lt "$MAX_ATTEMPTS" ]; do
            echo "--- Attempt $((ATTEMPTS + 1)): mode=${MODE} ---"
            HTTP_CODE=$(curl -sS -G -o /tmp/sync-response.json -w '%{http_code}' \
              --max-time 65 \
              --url "$BASE" \
              --data-urlencode "mode=${MODE}" \
              -H "$AUTH_HEADER")

            cat /tmp/sync-response.json
            echo ""

            if [ "$HTTP_CODE" -ge 400 ]; then
              if [ "$HTTP_CODE" -eq 504 ] || [ "$HTTP_CODE" -eq 502 ] || [ "$HTTP_CODE" -eq 503 ]; then
                echo "HTTP ${HTTP_CODE} — function timed out or gateway error; retrying with mode=continue."
                MODE="continue"
                ATTEMPTS=$((ATTEMPTS + 1))
                sleep 15
                continue
              fi
              echo "HTTP ${HTTP_CODE} from sync endpoint"
              exit 1
            fi

            STATUS=$(jq -r '.status // "error"' /tmp/sync-response.json)
            COMPLETE=$(jq -r '.complete // false' /tmp/sync-response.json)
            REASON=$(jq -r '.reason // ""' /tmp/sync-response.json)

            if [ "$STATUS" = "error" ]; then
              echo "Sync returned error status"
              exit 1
            fi

            if [ "$COMPLETE" = "true" ] || [ "$STATUS" = "complete" ]; then
              echo "Leaderboard refresh complete."
              exit 0
            fi

            if [ "$STATUS" = "skipped" ] && [ "$REASON" = "no_active_run" ] && [ "$MODE" = "continue" ]; then
              echo "No active run to continue — treating as done."
              exit 0
            fi

            MODE="continue"
            ATTEMPTS=$((ATTEMPTS + 1))
            sleep 15
          done

          echo "Exceeded max continue attempts (${MAX_ATTEMPTS})."
          exit 1
